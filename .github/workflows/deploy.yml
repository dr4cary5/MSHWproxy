name: Deploy MSHW-proxy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      DASHBOARD_PASS: ${{ secrets.DASHBOARD_PASS }}
      PROXY_PORT: 8080

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, curl, json, openssl, xml, zip
          coverage: none

      - name: 📦 Install Dependencies
        run: composer install --no-dev --optimize-autoloader --quiet

      - name: ⚙️ Prepare .env
        run: |
          echo "DASHBOARD_PASS=$DASHBOARD_PASS" > .env
          echo "PROXY_PORT=$PROXY_PORT" >> .env

      - name: 🚀 Start PHP Server
        run: |
          nohup php -S 0.0.0.0:$PROXY_PORT -t public/ > /tmp/php.log 2>&1 &
          sleep 3
          curl -s http://localhost:$PROXY_PORT/ > /dev/null && echo "✅ PHP OK" || echo "❌ PHP Failed"

      - name: 🛠️ Install ngrok (Official Apt Method)
        run: |
          # Install exactly like your sample
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install -y ngrok
          
          # Configure auth
          ngrok config add-authtoken $NGROK_AUTH_TOKEN

      - name: 🌐 Start SINGLE Ngrok Tunnel (Free Tier Compatible)
        run: |
          # Start ONLY one tunnel for proxy port (avoids pooling error)
          nohup ngrok http $PROXY_PORT --log=stdout > /tmp/ngrok.log 2>&1 &
          NGROK_PID=$!
          echo "Ngrok PID: $NGROK_PID"
          
          echo "⏳ Waiting for tunnel..."
          sleep 10
          
          # Verify ngrok is running
          if ! pgrep -x "ngrok" > /dev/null; then
            echo "❌ Ngrok died. Log:"
            cat /tmp/ngrok.log
            exit 1
          fi
          echo "✅ Ngrok running"

      - name: 📡 Extract & Display URL
        run: |
          sleep 3  # Ensure API is ready
          
          # Debug API response
          echo "🔍 API Response:"
          curl -s http://127.0.0.1:4040/api/tunnels | jq .
          
          # Extract URL
          PROXY_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          
          if [ -z "$PROXY_URL" ] || [ "$PROXY_URL" = "null" ]; then
            echo "❌ Failed to extract URL"
            exit 1
          fi
          
          echo "========================================="
          echo "🎉 MSHW-proxy Deployed!"
          echo "========================================="
          echo "🌐 Proxy URL: $PROXY_URL"
          echo "📋 Test: $PROXY_URL/?q=aHR0cHM6Ly9leGFtcGxlLmNvbQ=="
          echo "🔐 Dashboard: $PROXY_URL/dashboard (pass: DASHBOARD_PASS)"
          echo "========================================="
          
          # GitHub Summary
          echo "## 🎉 MSHW-proxy Live" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** [$PROXY_URL]($PROXY_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- **Test:** [Example]($PROXY_URL/?q=aHR0cHM6Ly9leGFtcGxlLmNvbQ==)" >> $GITHUB_STEP_SUMMARY

      - name: ♻️ Keep-Alive
        run: |
          echo "🔄 Monitor started..."
          while true; do
            pgrep -f "php -S" > /dev/null || nohup php -S 0.0.0.0:$PROXY_PORT -t public/ > /tmp/php.log 2>&1 &
            pgrep -x "ngrok" > /dev/null || nohup ngrok http $PROXY_PORT --log=stdout > /tmp/ngrok.log 2>&1 &
            echo "[$(date +%H:%M:%S)] 💓 OK"
            sleep 300
          done
