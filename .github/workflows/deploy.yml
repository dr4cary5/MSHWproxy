name: Deploy MSHW-proxy

on:
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level (info/debug)'
        required: false
        default: 'info'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      DASHBOARD_PASS: ${{ secrets.DASHBOARD_PASS }}
      CF_STRATEGY: ${{ vars.CF_STRATEGY || 'auto' }}
      PROXY_PORT: 8080
      TTY_PORT: 7681

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup PHP & Extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, curl, json, openssl, xml, zip
          coverage: none

      - name: 📦 Install Dependencies
        run: composer install --no-dev --optimize-autoloader --quiet

      - name: ⚙️ Generate Environment
        run: |
          cat > .env << EOF
          NGROK_AUTH_TOKEN=$NGROK_AUTH_TOKEN
          DASHBOARD_PASS=$DASHBOARD_PASS
          CF_STRATEGY=$CF_STRATEGY
          PROXY_PORT=$PROXY_PORT
          TTY_PORT=$TTY_PORT
          TTY_ENABLED=true
          TTY_AUTH=$DASHBOARD_PASS
          LOG_LEVEL=${{ github.event.inputs.log_level || 'info' }}
          LOG_WS=true
          EOF

      - name: 🚀 Start Services
        run: |
          chmod +x start.sh
          ./start.sh &
          echo "⏳ Waiting for services to initialize..."
          sleep 15

      - name: 🌐 Extract & Display URLs
        run: |
          PROXY_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[] | select(.config.addr == "8080") | .public_url' | head -1)
          TTY_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[] | select(.config.addr == "7681") | .public_url' | head -1)

          echo "========================================="
          echo "🎉 MSHW-proxy Deployed Successfully!"
          echo "========================================="
          echo "🌐 Proxy & Dashboard: $PROXY_URL"
          echo "🔧 Web Terminal (TTY): $TTY_URL"
          echo "📋 Test: $PROXY_URL/?q=$(echo -n 'https://example.com' | base64)"
          echo "========================================="

          echo "## 🎉 MSHW-proxy Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Proxy & Dashboard | \`$PROXY_URL\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Web Terminal | \`$TTY_URL\` |" >> $GITHUB_STEP_SUMMARY

      - name: ♻️ Keep-Alive Loop
        run: |
          echo "🔄 Starting health monitor..."
          while true; do
            if ! pgrep -f "php -S" > /dev/null; then echo "⚠️ PHP restarted"; php -S 0.0.0.0:$PROXY_PORT -t public/ >> /tmp/mshw-proxy.log 2>&1 & fi
            if ! pgrep -f "ngrok" > /dev/null; then echo "⚠️ ngrok restarted"; ngrok start --all >> /tmp/mshw-proxy.log 2>&1 & fi
            echo "[$(date '+%H:%M:%S')] 💓 Heartbeat OK"
            sleep 300
          done
